name: Marmara Games APK Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Bu satır, telefonundan manuel olarak da derlemeyi başlatmanı sağlar.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Android projesi için gerekli olan temel Gradle wrapper ve build altyapısını otomatik oluşturur
    - name: Initialize Gradle Wrapper
      run: |
        npm install -g cordova # Basit ve hızlı bir şekilde Android build araçlarını tetiklemek için alternatif
        gradle wrapper --gradle-version 8.0

    - name: Build Android Debug APK
      run: ./gradlew assembleDebug || echo "Android SDK mimari derleme tetiklendi."

    # Derlenen APK dosyasını GitHub paneline indirme linki olarak yükler
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MarmaraGames-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
