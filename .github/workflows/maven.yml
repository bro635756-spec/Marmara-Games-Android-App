name: Marmara Games Cloud Build

on:
  push:
    branches: [ "main", "master" ] # Kodunu hangi dala yüklüyorsan orayı tetikler
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Adım: GitHub deposundaki tüm dosyalarını bulut sunucusuna çekiyoruz
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Adım: Sistemdeki Java (JDK 17) ortamını kuruyoruz
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. Adım: Gradle derleyicisine çalıştırma izni veriyoruz
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew
      continue-on-error: true

    # 4. Adım: Projeyi profesyonel ve imzalanmaya hazır Release APK olarak derliyoruz
    - name: Build Release APK with Gradle
      run: |
        if [ -f ./gradlew ]; then
          ./gradlew assembleRelease
        else
          gradle assembleRelease
        fi

    # 5. Adım: Derlenen canavar gibi APK dosyasını GitHub ekranına indirme linki olarak çıkartıyoruz
    - name: Upload Marmara Games APK
      uses: actions/upload-artifact@v4
      with:
        name: Marmara-Games-Professional-APK
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/outputs/apk/debug/*.apk
