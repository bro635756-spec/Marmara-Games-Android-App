name: Marmara Games APK Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Dosyaları source klasöründen alıp derleme dizinine yerleştiriyoruz
    - name: Setup Project Directories
      run: |
        mkdir -p app/src/main/java/com/marmaragames/core
        mkdir -p app/src/main/java/com/marmaragames/sdk
        
        # Hazırladığın kodları ve gradle yapılandırmalarını taşıyalım
        cp source/build.gradle app/build.gradle
        cp source/settings.gradle settings.gradle
        cp source/AndroidManifest.xml app/src/main/AndroidManifest.xml
        
        cp app.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp app_api_builder.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp source/android.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp source/main.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp source/source_settings_auto.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp sdk/read_javascript.java app/src/main/java/com/marmaragames/sdk/ 2>/dev/null || true

        # Kök dizin için üst build script bağlayıcı
        echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }" > build.gradle
        
        gradle wrapper --gradle-version 8.0.2

    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MarmaraGames-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        
