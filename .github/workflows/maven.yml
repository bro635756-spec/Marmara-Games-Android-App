name: Marmara Games APK Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Tüm Android mimarisini sıfırdan ve hatasız inşa ediyoruz
    - name: Scaffold Complete Android Structure
      run: |
        mkdir -p app/src/main/java/com/marmaragames/core
        mkdir -p app/src/main/java/com/marmaragames/sdk
        mkdir -p app/src/main/res/values

        # 1. Kök dizin ayarları (Root Configs)
        echo "include ':app'" > settings.gradle
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        # 2. Uygulama modülü ayarları (App Configs)
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.marmaragames.core'
            compileSdk 34
            defaultConfig {
                applicationId "com.marmaragames.core"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # 3. Temel Res Dosyaları (Eksik kaynak hatasını önlemek için)
        echo '<resources><string name="app_name">Marmara Games Hub</string></resources>' > app/src/main/res/values/strings.xml

        # 4. Kodları Yerlerine Güvenli Şekilde Taşıma
        cp app.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp app_api_builder.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp source/AndroidManifest.xml app/src/main/AndroidManifest.xml 2>/dev/null || true
        cp source/android.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp source/main.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp source/source_settings_auto.java app/src/main/java/com/marmaragames/core/ 2>/dev/null || true
        cp sdk/read_javascript.java app/src/main/java/com/marmaragames/sdk/ 2>/dev/null || true

        # 5. Gradle Wrapper Kurulumu
        gradle wrapper --gradle-version 8.0.2

    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MarmaraGames-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        
